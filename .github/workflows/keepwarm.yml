name: Keep login warm

# 每 5 分鐘戳一次正式站的登入函式(GET 保溫端點),讓它保持「熱」，
# 避免學員登入踩到 serverless 冷啟動(實測冷啟動約 +2 秒)。
# 註：GitHub 排程在低活躍時可能延後幾分鐘；且 repo 連續 60 天無提交會自動停用排程。

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}   # 可在 Actions 頁手動執行一次

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production login warmup
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://nlp-game-beta.vercel.app/api/auth/login || echo "000")
          echo "warmup HTTP $code"
